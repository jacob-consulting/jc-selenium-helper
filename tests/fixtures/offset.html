<!-- tests/fixtures/offset.html -->
<!doctype html>
<html>
  <head>
    <title>offset</title>
    <style>
      body { margin: 0; }
      #anchor { position: absolute; left: 100px; top: 100px; width: 40px; height: 40px; background: #ccc; }
      #offset-target { position: absolute; left: 190px; top: 90px; width: 60px; height: 60px; background: #eee; }
    </style>
  </head>
  <body>
    <div id="anchor">anchor</div>
    <div id="offset-target"></div>
    <div id="offset-result"></div>
    <script>
      // record the first hover onto #offset-target
      document
        .getElementById("offset-target")
        .addEventListener("mouseover", function () {
          document.getElementById("offset-result").textContent = "offset-hovered";
        });
    </script>
  </body>
</html>
